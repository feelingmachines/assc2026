<!DOCTYPE html>
<html lang="en">

<style>
  :root{ --frame:#efe7e4; --paper:#fdf6f5; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--frame); }
  body{ min-height:100vh; }

  /* the poster, fit to the window width (capped), scrolled like any tall poster */
  #stage{ max-width:1600px; margin:0 auto; }
  #poster{ position:relative; width:100%; line-height:0;
    box-shadow:0 2vh 7vh rgba(40,25,20,.20); }
  #bg{ display:block; width:100%; height:auto; }

  /* video panels laid exactly over the two board thumbnails */
  .slot{ position:absolute; overflow:hidden; cursor:zoom-in;
    border-radius:.7%; background:#0e0f13; }
  .slot video{ width:100%; height:100%; object-fit:cover; display:block; }
  #s1{ left:56.82%; top:14.53%; width:23.37%; height:10.11%; }
  #s2{ left:45.37%; top:47.19%; width:13.25%; height:9.94%; }
  /* hide the print footer's "watch the agents … feelingmachines.net/assc2026" */
  #footpatch{ position:absolute; left:65%; top:96.8%; width:35%; height:2.7%;
    background:var(--paper); }

  /* download chip */
  #chips{ position:fixed; right:14px; bottom:12px; z-index:20;
    font:600 12.5px/1 -apple-system,"Helvetica Neue",Arial,sans-serif; }
  #chips a{ display:inline-block; text-decoration:none; color:#4836a2;
    border:1px solid rgba(30,20,18,.14); background:rgba(255,255,255,.82);
    backdrop-filter:saturate(150%) blur(6px); border-radius:999px; padding:8px 13px; }
  #chips a:hover{ background:#4836a2; color:#fff; border-color:#4836a2; }

  /* click-to-enlarge lightbox */
  #lb{ position:fixed; inset:0; z-index:40; display:none; align-items:center;
    justify-content:center; background:rgba(14,15,19,.9); padding:3vmin;
    cursor:zoom-out; }
  #lb.on{ display:flex; }
  #lb video{ max-width:96vw; max-height:94vh; width:auto; height:auto;
    border-radius:10px; box-shadow:0 20px 80px rgba(0,0,0,.6); background:#0e0f13; }
  #lbcap{ position:fixed; left:0; right:0; bottom:16px; text-align:center;
    color:#c9cdd6; font:600 13px/1.4 -apple-system,"Helvetica Neue",Arial,sans-serif; }
  #msg{ position:fixed; inset:0; display:none; align-items:center;
    justify-content:center; color:#6b5f5a; padding:34px; text-align:center;
    font:15px/1.6 -apple-system,"Helvetica Neue",Arial,sans-serif; }
</style>
</head>
<body>

<div id="stage">
  <div id="poster">
    <img id="bg" src="poster.png" alt="Skin in the Game (ASSC 2026 poster)">
    <div class="slot" id="s1" data-full="media/asif_board.mp4">
      <video src="media/asif_board.mp4" autoplay loop muted playsinline></video>
    </div>
    <div class="slot" id="s2" data-full="media/refuge_full.mp4">
      <video src="media/refuge_board.mp4" autoplay loop muted playsinline></video>
    </div>
    <div id="footpatch"></div>
  </div>
</div>

<div id="chips"><a id="pdf" href="poster.pdf">PDF ↓</a></div>

<div id="lb"><video id="lbv" loop muted playsinline autoplay controls></video><div id="lbcap"></div></div>
<div id="msg"></div>

<script>
  var lb  = document.getElementById('lb');
  var lbv = document.getElementById('lbv');
  var cap = document.getElementById('lbcap');
  var openId = 0;   // bumped on every open/close so stale loads can't play into a closed box

  function play(id){
    if(id !== openId || !lb.classList.contains('on')) return;
    var p = lbv.play();
    if(p && p.catch) p.catch(function(){});
  }
  function openLB(full, text){
    var id = ++openId;
    cap.textContent = text || '';
    lb.classList.add('on');
    document.body.style.overflow = 'hidden';
    count('video-expand', 'Expanded a clip');
    // The enlarged clip is a different, un-cached file from the thumbnail, so it
    // has to be fetched first. Calling play() before there is data makes the
    // element fire an internal pause and sometimes stay stuck, so we DON'T play
    // eagerly: we wait for canplay, which is the one reliable "safe to play" cue.
    lbv.addEventListener('canplay', function once(){
      lbv.removeEventListener('canplay', once);
      play(id);
    });
    lbv.src = full;
    lbv.load();
    if(lbv.readyState >= 3) play(id);   // already buffered (same clip reopened)
  }
  function closeLB(){
    openId++;   // void any pending loadeddata play from the clip we're leaving
    lb.classList.remove('on'); lbv.pause(); lbv.removeAttribute('src'); lbv.load();
    document.body.style.overflow = '';
  }
  document.querySelectorAll('.slot').forEach(function(s){
    s.addEventListener('click', function(){ openLB(s.dataset.full, s.dataset.cap); });
  });
  lb.addEventListener('click', function(e){ if(e.target === lb || e.target === lbv) closeLB(); });
  addEventListener('keydown', function(e){ if(e.key === 'Escape') closeLB(); });

  document.getElementById('bg').addEventListener('error', function(){
    var m = document.getElementById('msg');
    m.style.display = 'flex';
    m.textContent = 'Poster image failed to load.';
  });

  // --- analytics events (no-ops until GoatCounter's async script has loaded) ---
  function count(path, title){
    if(window.goatcounter && window.goatcounter.count)
      window.goatcounter.count({ path: path, title: title, event: true });
  }
  var pdf = document.getElementById('pdf');
  if(pdf) pdf.addEventListener('click', function(){ count('pdf-download', 'PDF download'); });
</script>

<!-- GoatCounter: privacy-friendly analytics (visitors, referrers, custom events) -->
<script data-goatcounter="https://feelingmachines.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
